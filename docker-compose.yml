services:
  backend:
    build: ./backend
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    container_name: thermotree_be
    volumes:
      - ./backend:/app
    environment:
      NOMINATIM_BASE_URL: ${NOMINATIM_BASE_URL:-https://nominatim.openstreetmap.org}
      NOMINATIM_USER_AGENT: "${NOMINATIM_USER_AGENT:-thermotree/0.1 (set NOMINATIM_USER_AGENT to your contact email)}"
      PHOTON_BASE_URL: ${PHOTON_BASE_URL:-https://photon.komoot.io}
      PHOTON_USER_AGENT: "${PHOTON_USER_AGENT:-thermotree/0.1 (set PHOTON_USER_AGENT to your contact email)}"
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      # Stop at the node-based stage of frontend/Dockerfile. The default
      # final stage is nginx-unprivileged (no npm), which would make the
      # `npm install && npm start` command below exit 127. Prod builds
      # via docker-compose.prod.yml don't set `target` and get the
      # full nginx image as intended.
      target: build
      args:
        NODE_VER: ${NODE_VERSION}
    container_name: thermotree_fe
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    command: sh -c "npm install && npm start -- --host 0.0.0.0 --poll 2000"
