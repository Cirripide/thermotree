# GitHub Actions workflow for Thermotree → Azure Container Apps.
#
# Two-pass infra: ACR/CAE/LogAnalytics come up first, images are built next,
# then Container Apps are created with real images from the start. No
# placeholder revision ever runs, so the historical "Activation failed →
# Operation expired" race against ACA's revision health check is gone.
#
# Jobs:
#   1. validate          — bicep build + what-if (PR + main, foundation-only).
#   2. infra-foundation  — ACR + CAE + Log Analytics. No Container Apps.
#   3. build-backend     ┐
#   4. build-frontend    ┘ parallel buildx → ACR (main only).
#   5. infra-apps        — Container Apps + AcrPull roles, with the freshly
#                          built SHA-tagged images. Bicep also injects the
#                          user-agent + LocationIQ secrets and the frontend
#                          UPSTREAM_BACKEND env var, so no separate deploy
#                          step is needed.
#
# PRs run validate only. No ACR pushes, no infra changes, no deploys.
#
# Auth: OIDC federated credential on an Azure AD app registration.
# See infra/README.md for one-time setup.

name: Azure deploy

on:
  push:
    branches: [ main ]
    paths:
      - backend/**
      - frontend/**
      - infra/**
      - docker-compose.prod.yml
      - .github/workflows/azure-deploy.yml
  pull_request:
    branches: [ main ]

permissions:
  id-token: write   # required to mint the OIDC token for azure/login
  contents: read

env:
  RG_NAME: rg-thermotree
  LOCATION: westeurope
  BICEP_FILE: infra/main.bicep
  BICEP_PARAMS: infra/main.parameters.json
  BACKEND_IMAGE_REPO: thermotree-backend
  FRONTEND_IMAGE_REPO: thermotree-frontend
  # Full 40-char commit SHA — immutable, traceable. Bicep deploys this
  # tag directly, so the running revision is always identifiable.
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # =========================================================================
  # 1. Validate — runs on every push and every PR.
  # =========================================================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # what-if needs an Azure session. Fork PRs cannot use our OIDC trust,
      # so we skip azure/login (and the what-if step) on fork PRs.
      - name: Azure login (OIDC)
        if: github.event.pull_request.head.repo.fork != true
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: az bicep build (lint + compile)
        if: github.event.pull_request.head.repo.fork != true
        run: |
          set -euo pipefail
          az bicep version
          az bicep build --file "$BICEP_FILE" --stdout > /dev/null
          echo "Bicep compiled cleanly."

      # foundation-only preview: deployContainerApps=false matches what the
      # infra-foundation job will actually do, and avoids needing the real
      # image params (which don't exist on PR-time).
      - name: az deployment what-if (foundation preview)
        if: github.event.pull_request.head.repo.fork != true
        run: |
          set -euo pipefail
          az deployment group what-if \
            --resource-group "$RG_NAME" \
            --template-file "$BICEP_FILE" \
            --parameters "$BICEP_PARAMS" \
            --parameters acrName="${{ vars.ACR_NAME }}" \
            --parameters nominatimUserAgent="${{ secrets.NOMINATIM_USER_AGENT }}" \
            --parameters photonUserAgent="${{ secrets.PHOTON_USER_AGENT }}" \
            --parameters locationIqApiKey="${{ secrets.LOCATIONIQ_API_KEY }}" \
            --parameters deployContainerApps=false \
            || echo "what-if produced a diff (expected on infra changes)."

      # Fallback for fork PRs: lint-only bicep build (no Azure session needed
      # because `az bicep build` is purely local).
      - name: az bicep build (fork PR, lint-only)
        if: github.event.pull_request.head.repo.fork == true
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail
            az bicep version
            az bicep build --file "$BICEP_FILE" --stdout > /dev/null
            echo "Bicep compiled cleanly (fork PR — what-if skipped)."

  # =========================================================================
  # 2. Foundation infra — ACR + CAE + Log Analytics. main only.
  #
  # Skips Container Apps via `deployContainerApps=false` so this pass can
  # complete before any image exists in ACR. Outputs the ACR login server
  # for the build jobs.
  # =========================================================================
  infra-foundation:
    name: Infra foundation (ACR + CAE)
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      acr_login_server: ${{ steps.deploy.outputs.acr_login_server }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy foundation
        id: deploy
        run: |
          set -euo pipefail

          deployment_name="thermotree-foundation-${{ github.run_id }}"

          az deployment group create \
            --name "$deployment_name" \
            --resource-group "$RG_NAME" \
            --template-file "$BICEP_FILE" \
            --parameters "$BICEP_PARAMS" \
            --parameters acrName="${{ vars.ACR_NAME }}" \
            --parameters nominatimUserAgent="${{ secrets.NOMINATIM_USER_AGENT }}" \
            --parameters photonUserAgent="${{ secrets.PHOTON_USER_AGENT }}" \
            --parameters locationIqApiKey="${{ secrets.LOCATIONIQ_API_KEY }}" \
            --parameters deployContainerApps=false \
            --output none

          outputs=$(az deployment group show \
            -g "$RG_NAME" -n "$deployment_name" \
            --query properties.outputs -o json)

          echo "acr_login_server=$(echo "$outputs" | jq -r '.acrLoginServer.value')" >> "$GITHUB_OUTPUT"

  # =========================================================================
  # 3. Build — backend + frontend in parallel.
  # Each job exposes the full image reference as `outputs.image` so the
  # apps pass can deploy by SHA-tagged ref.
  # =========================================================================
  build-backend:
    name: Build backend image
    needs: infra-foundation
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Compose image reference
        id: image
        run: echo "image=${{ needs.infra-foundation.outputs.acr_login_server }}/${{ env.BACKEND_IMAGE_REPO }}:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - uses: docker/setup-buildx-action@v3

      - name: docker buildx → ACR (backend)
        uses: docker/build-push-action@v6
        with:
          context: backend/
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ steps.image.outputs.image }}
            ${{ needs.infra-foundation.outputs.acr_login_server }}/${{ env.BACKEND_IMAGE_REPO }}:latest
          cache-from: type=registry,ref=${{ needs.infra-foundation.outputs.acr_login_server }}/${{ env.BACKEND_IMAGE_REPO }}:buildcache
          cache-to: type=registry,ref=${{ needs.infra-foundation.outputs.acr_login_server }}/${{ env.BACKEND_IMAGE_REPO }}:buildcache,mode=max

  build-frontend:
    name: Build frontend image
    needs: infra-foundation
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Compose image reference
        id: image
        run: echo "image=${{ needs.infra-foundation.outputs.acr_login_server }}/${{ env.FRONTEND_IMAGE_REPO }}:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

      - name: Read Node version from .nvmrc
        id: node
        run: echo "node_ver=$(tr -d '[:space:]' < frontend/.nvmrc)" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - uses: docker/setup-buildx-action@v3

      - name: docker buildx → ACR (frontend)
        uses: docker/build-push-action@v6
        with:
          context: frontend/
          platforms: linux/amd64
          push: true
          provenance: false
          build-args: |
            NODE_VER=${{ steps.node.outputs.node_ver }}
            PUBLIC_API_URL=${{ vars.PUBLIC_API_URL || '/api/' }}
          tags: |
            ${{ steps.image.outputs.image }}
            ${{ needs.infra-foundation.outputs.acr_login_server }}/${{ env.FRONTEND_IMAGE_REPO }}:latest
          cache-from: type=registry,ref=${{ needs.infra-foundation.outputs.acr_login_server }}/${{ env.FRONTEND_IMAGE_REPO }}:buildcache
          cache-to: type=registry,ref=${{ needs.infra-foundation.outputs.acr_login_server }}/${{ env.FRONTEND_IMAGE_REPO }}:buildcache,mode=max

  # =========================================================================
  # 4. Apps infra — Container Apps with real SHA-tagged images.
  #
  # Bicep handles everything: image, user-agent + LocationIQ secrets,
  # the frontend's UPSTREAM_BACKEND env var, and the AcrPull role
  # assignments. No follow-up deploy job is needed.
  # =========================================================================
  infra-apps:
    name: Infra apps (Container Apps)
    needs: [ infra-foundation, build-backend, build-frontend ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy apps
        id: deploy
        run: |
          set -euo pipefail

          deployment_name="thermotree-apps-${{ github.run_id }}"

          az deployment group create \
            --name "$deployment_name" \
            --resource-group "$RG_NAME" \
            --template-file "$BICEP_FILE" \
            --parameters "$BICEP_PARAMS" \
            --parameters acrName="${{ vars.ACR_NAME }}" \
            --parameters nominatimUserAgent="${{ secrets.NOMINATIM_USER_AGENT }}" \
            --parameters photonUserAgent="${{ secrets.PHOTON_USER_AGENT }}" \
            --parameters locationIqApiKey="${{ secrets.LOCATIONIQ_API_KEY }}" \
            --parameters deployContainerApps=true \
            --parameters backendImage="${{ needs.build-backend.outputs.image }}" \
            --parameters frontendImage="${{ needs.build-frontend.outputs.image }}" \
            --parameters customDomainName="${{ vars.FRONTEND_CUSTOM_DOMAIN }}" \
            --parameters customDomainCertificateName="${{ vars.FRONTEND_CUSTOM_DOMAIN_CERT_NAME }}" \
            --output none

          outputs=$(az deployment group show \
            -g "$RG_NAME" -n "$deployment_name" \
            --query properties.outputs -o json)

          frontend_fqdn=$(echo "$outputs" | jq -r '.frontendFqdn.value')
          echo "Deployed. Frontend FQDN: https://$frontend_fqdn"
